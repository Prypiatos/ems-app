_format_version: "3.0"
_transform: true

services:
  - name: ems-backend
    url: http://ems-backend:8080
    routes:
      - name: ems-api
        paths:
          - /api
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      second: 5
      hour: 10000
      policy: local

  - name: key-auth
    config:
      key_names:
        - apikey

consumers:
  - username: admin
    keyauth_credentials:
      - key: ems-secret-key
